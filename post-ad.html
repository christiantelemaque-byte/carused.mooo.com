<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Post Ad - LuxeCompanions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <style>/* same as before, plus: */
        .scam-warning { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; text-align: center; }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/cache.js"></script>
    <script>
        window.openAuthModal = window.openAuthModal || function() { var modal = document.getElementById('authModal'); if (modal) modal.style.display = 'block'; if (typeof loadAuthForms === 'function') loadAuthForms(); };
        // Scam keywords list
        const scamKeywords = [
            'urgent', 'wire transfer', 'western union', 'moneygram', 'gift card',
            'paypal', 'cash app', 'zelle', 'bitcoin', 'crypto', 'deposit',
            'advance fee', 'credit card', 'bank transfer', 'send money', 'prepaid'
        ];
        function containsScam(text) {
            const lower = text.toLowerCase();
            return scamKeywords.some(keyword => lower.includes(keyword));
        }
    </script>
</head>
<body>
    <nav class="navbar" id="navbar">...</nav>

    <main style="padding: 2rem 1.5rem; max-width: 800px; margin: 0 auto;">
        <div style="background: white; border-radius: 15px; padding: 2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <h1>Create New Listing</h1>
            <div id="pageError" class="page-error"></div>
            <div id="scamWarning" class="scam-warning" style="display: none;">
                ⚠️ Your post contains words that may indicate a scam. To post this, you must have a VIP subscription. <a href="subscription.html" style="color: var(--primary-pink); font-weight:600;">Upgrade now</a>
            </div>
            <div id="subscriptionWarning" style="background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; display: none;">
                <i class="fas fa-exclamation-triangle"></i> You need an active subscription to post. <a href="subscription.html">Subscribe</a>
            </div>

            <form id="postForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="6" required></textarea>
                </div>
                <div class="form-group">
                    <label for="imageFiles">Photos (up to 5)</label>
                    <input type="file" id="imageFiles" accept="image/*" multiple>
                    <div id="imagePreview"></div>
                </div>
                <div class="form-group">
                    <label>Your subscription status</label>
                    <div id="subscriptionStatus">Checking...</div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" id="submitBtn" class="btn-primary">Publish Listing</button>
                    <a href="dashboard.html" class="btn-secondary">Cancel</a>
                </div>
            </form>

            <div id="uploadProgress" class="upload-progress">
                <p id="progressMessage">Processing...</p>
                <progress id="progressBar" value="0" max="100"></progress>
            </div>
            <div id="postMessage" class="auth-message"></div>
        </div>
    </main>

    <footer>...</footer>
    <div id="authModal" class="modal">...</div>
    <div id="contactModal" class="modal">...</div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const UPLOAD_IMAGE_URL = 'https://carused-mooo-com.vercel.app/api/upload-image';
        const SAVE_POST_URL = 'https://carused-mooo-com.vercel.app/api/publish-post';

        // ... (keep all helper functions: showPageError, hasActiveSubscription, updateSubscriptionStatus, image preview, compress, uploadSingleImage, savePost)

        // New: check scam on description change
        document.getElementById('description').addEventListener('input', function() {
            const desc = this.value;
            const scamWarning = document.getElementById('scamWarning');
            if (containsScam(desc)) {
                scamWarning.style.display = 'block';
            } else {
                scamWarning.style.display = 'none';
            }
        });

        (async function init() {
            if (!window.supabase) { showPageError('Supabase client not initialized.'); return; }
            const { data: { user }, error } = await window.supabase.auth.getUser();
            if (error || !user) { window.location.href = 'index.html'; return; }
            await updateSubscriptionStatus();

            document.getElementById('postForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const active = await hasActiveSubscription();
                if (!active) { showMessage('You need an active subscription to post.', 'error'); return; }

                const title = document.getElementById('title').value.trim();
                const description = document.getElementById('description').value.trim();
                const files = document.getElementById('imageFiles').files;
                if (!title || !description) { showMessage('Please fill all required fields', 'error'); return; }

                // Scam check
                const isScam = containsScam(description);
                if (isScam) {
                    // Need VIP
                    const { data: profile } = await window.supabase.from('profiles').select('subscription_type').eq('id', user.id).single();
                    if (!profile || profile.subscription_type !== 'vip') {
                        showMessage('This post contains suspicious content and requires a VIP subscription. Please upgrade.', 'error');
                        return;
                    }
                }

                // Proceed with upload (same as before)
                // ... (upload loop, savePost with isVip flag based on actual subscription)
            });
        })();

        // ... (rest of the script: upload functions, mobile menu, contact modal)
    </script>
</body>
    </html>
