<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Details - LuxeCompanions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <style>
        .post-container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .post-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; background: white; border-radius: 15px; padding: 2rem; }
        .post-images img { width: 100%; border-radius: 10px; }
        .post-title { font-size: 2rem; color: var(--dark-pink); }
        .post-meta { display: flex; gap: 1rem; color: #666; margin: 1rem 0; }
        .vip-badge { background: var(--gold); color: white; padding: 0.2rem 1rem; border-radius: 20px; }
        .post-description { line-height: 1.8; white-space: pre-wrap; }
        .btn-back { display: inline-block; margin-top: 2rem; padding: 0.6rem 1.2rem; border: 2px solid var(--primary-pink); border-radius: 30px; color: var(--primary-pink); text-decoration: none; }
        @media (max-width: 768px) { .post-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">...</nav>
    <main class="post-container" id="postContainer">
        <div class="loading">Loading post...</div>
    </main>
    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            const container = document.getElementById('postContainer');
            if (!postId) { container.innerHTML = '<div class="error">No post ID</div>'; return; }
            if (!window.supabase) { container.innerHTML = '<div class="error">Supabase not loaded</div>'; return; }
            try {
                const { data: post, error } = await window.supabase
                    .from('posts')
                    .select('*, profiles(username)')
                    .eq('id', postId)
                    .single();
                if (error) throw error;
                if (!post) throw new Error('Post not found');
                const date = new Date(post.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
                container.innerHTML = `
                    <div class="post-layout">
                        <div class="post-images">
                            ${post.images && post.images[0] ? `<img src="${post.images[0]}" alt="Main image">` : '<div>No image</div>'}
                        </div>
                        <div class="post-info">
                            <h1 class="post-title">${escapeHtml(post.title)}</h1>
                            <div class="post-meta">
                                <span><i class="fas fa-user"></i> ${escapeHtml(post.profiles?.username || 'Anonymous')}</span>
                                <span><i class="fas fa-calendar"></i> ${date}</span>
                                ${post.is_vip ? '<span class="vip-badge"><i class="fas fa-crown"></i> VIP</span>' : ''}
                            </div>
                            <div class="post-description">${escapeHtml(post.description).replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
                `;
            } catch (err) {
                container.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        })();
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
